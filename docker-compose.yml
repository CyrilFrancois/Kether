services:
  db:
    image: postgres:16
    container_name: kether_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kether_dev_pass}
      POSTGRES_DB: kether
    ports:
      - "5432:5432"
    volumes:
      - ./kether_db_data:/var/lib/postgresql/data
    # ADD THIS SECTION:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kether"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kether_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy # Changes from just '- db'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-kether_dev_pass}@db:5432/kether
      - OPENAI_API_KEY=${GPT_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
      - ./foundry:/app/foundry

  frontend:
    build: ./frontend
    container_name: kether_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      # This line is a 'trick': it tells Docker NOT to overwrite the 
      # container's node_modules with your local (empty) folder.
      - /app/node_modules 
    depends_on:
      - backend