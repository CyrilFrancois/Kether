version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kether_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kether_dev_pass}
      POSTGRES_DB: kether
    ports:
      - "5432:5432"
    shm_size: 128mb
    volumes:
      - kether_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kether"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - kether_net

  backend:
    build: ./backend
    container_name: kether_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-kether_dev_pass}@db:5432/kether
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RESET_DB=${RESET_DB:-false}
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
      - ./foundry:/app/foundry
      - ./workspace_output:/app/workspace_output
    # --- FIX: Using native Python to avoid "wget not found" errors ---
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s 
    networks:
      - kether_net

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kether_frontend
    restart: always
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    # This condition is what holds the frontend back until the healthcheck above passes
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kether_net

networks:
  kether_net:
    driver: bridge

volumes:
  kether_db_data: