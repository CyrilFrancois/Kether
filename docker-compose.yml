version: '3.8'

services:
  db:
    image: postgres:16
    container_name: kether_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kether_dev_pass}
      POSTGRES_DB: kether
    ports:
      - "5432:5432"
    volumes:
      - ./kether_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kether"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kether_net

  backend:
    build: ./backend
    container_name: kether_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-kether_dev_pass}@db:5432/kether
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
      - ./foundry:/app/foundry
    networks:
      - kether_net

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kether_frontend
    restart: always
    # FIX 1: Map to 0.0.0.0 explicitly via the command if the Dockerfile missed it
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      # FIX 2: Ensure node_modules is an anonymous volume so local empty folders don't overwrite the container
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - kether_net

networks:
  kether_net:
    driver: bridge