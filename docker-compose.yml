version: '3.8'

services:
  # --- THE MEMORY (PostgreSQL) ---
  db:
    image: postgres:16
    container_name: kether_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kether_dev_pass}
      POSTGRES_DB: kether
    ports:
      - "5432:5432"
    volumes:
      - ./kether_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kether"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kether_net

  # --- THE BRAIN (FastAPI Engine) ---
  backend:
    build: ./backend
    container_name: kether_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-kether_dev_pass}@db:5432/kether
      - OPENAI_API_KEY=${GPT_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
      - ./foundry:/app/foundry
    networks:
      - kether_net

  # --- THE FACE (Vite/React) ---
  frontend:
    build: ./frontend
    container_name: kether_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      # The 'Anonymous Volume' trick to protect container node_modules
      - /app/node_modules 
    depends_on:
      - backend
    networks:
      - kether_net

networks:
  kether_net:
    driver: bridge