version: '3.8'

services:
  db:
    image: postgres:16
    container_name: kether_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kether_dev_pass}
      POSTGRES_DB: kether
    ports:
      - "5432:5432"
    volumes:
      - kether_db_data:/var/lib/postgresql/data # Changed to named volume for better performance/reliability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kether"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kether_net

  backend:
    build: ./backend
    container_name: kether_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-kether_dev_pass}@db:5432/kether
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RESET_DB=${RESET_DB:-false}
      - PYTHONPATH=/app # Ensures the backend can see all sub-modules clearly
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./agents:/app/agents
      - ./foundry:/app/foundry # This is critical: AI-generated code will live here
      - ./workspace_output:/app/workspace_output # New: A sandbox for the L4 Technical Task files
    networks:
      - kether_net

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kether_frontend
    restart: always
    # Using 'dev' command to ensure HMR (Hot Module Replacement) works during development
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overriding container modules
    depends_on:
      - backend
    networks:
      - kether_net

networks:
  kether_net:
    driver: bridge

# Using a named volume for the DB is generally safer for schema updates
volumes:
  kether_db_data: